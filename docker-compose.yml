services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - sqlite-data:/data
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_PATH: /data/board_game_score.db
      # CORS_ORIGINS: update this to your actual domain in production (e.g. https://yourdomain.com)
      CORS_ORIGINS: http://localhost:5000
    restart: unless-stopped

volumes:
  sqlite-data:
